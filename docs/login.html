<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=700, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ingreso Tesorería</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="login-body">
    <main class="login-shell">
        <section class="login-card">
            <p class="eyebrow">Acceso al sistema</p>
            <h1>Ingreso de alumnos y tesorero</h1>
            <div class="notice hidden" id="config-warning"></div>
            <form id="login-form" class="stack-form">
                <label>
                    Correo institucional
                    <input type="email" name="email" placeholder="Correo institucional" required>
                </label>
                <label>
                    Contraseña
                    <div class="password-field">
                        <input type="password" id="password-input" name="password" placeholder="********" required>
                        <button class="password-toggle" id="toggle-password-button" type="button">Ver</button>
                    </div>
                </label>
                <p class="error-text hidden" id="login-error">Reintenta con otra contraseña.</p>
                <button class="button" type="submit">Entrar</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script type="module" src="./js/login.js"></script>
</body>
</html>
